name: Update EU Calls

on:
  schedule:
    - cron: "0 3 * * *"   # ogni notte alle 03:00 UTC
  workflow_dispatch:       # permette anche il run manuale dal tab Actions

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # necessario per fare commit nel repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch calls from EU API
        run: node fetch_calls.js

      - name: Commit calls.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calls.json
          git diff --staged --quiet || git commit -m "chore: update calls.json [$(date -u +%Y-%m-%d)]"
          git push
